version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: example
    main: ./cmd/example
    binary: example
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

  - id: kit
    main: ./cmd/kit
    binary: kit
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: example
    builds: [example]
    name_template: "example_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

  - id: kit
    builds: [kit]
    name_template: "kit_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: example
    ids: [example]
    repository:
      owner: coreycoburn
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/coreycoburn/cli-forge
    description: An example CLI built with cli-forge
    license: MIT
    install: |
      bin.install "example"

  - name: kit
    ids: [kit]
    repository:
      owner: coreycoburn
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/coreycoburn/cli-forge
    description: Design asset toolkit — convert and optimize files
    license: MIT
    dependencies:
      - name: ghostscript
    caveats: |
      The convert command also requires Inkscape:
        brew install --cask inkscape
    install: |
      bin.install "kit"
